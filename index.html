<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>World Cup TCG</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#030712;
color:white;
font-family:sans-serif;
}

.tab-view{display:none}
.tab-view.active{display:block}

.pack-area{

display:flex;

justify-content:center;

align-items:center;

gap:12px;

margin-top:30px;

}

.arrow{

width:65px;
height:65px;

border-radius:50%;

background:rgba(255,255,255,.10);

font-size:34px;

font-weight:900;

}

.pack-card{

width:320px;

text-align:center;

}

.pack-img{

width:100%;

border-radius:28px;

box-shadow:
0 25px 55px rgba(0,0,0,.45);

}

.buy-btn{

width:100%;

padding:18px;

border-radius:22px;

background:white;

color:black;

font-size:22px;

font-weight:900;

margin-top:18px;

}

</style>
</head>

<body class="pb-24">

<header class="p-4 text-center border-b border-gray-800">

<h1 class="text-2xl font-black text-green-400">
⚽ WORLD CUP TCG
</h1>

<p id="walletText"
class="text-xs text-gray-400">

Connecting...

</p>

</header>

<div id="tab-pack"
class="tab-view active">

<div class="pack-area">

<button
onclick="prevPack()"
class="arrow">

◀

</button>

<div id="packContainer"></div>

<button
onclick="nextPack()"
class="arrow">

▶

</button>

</div>

</div>

<div id="tab-lineup"
class="tab-view px-6">

<div
id="pitch"

class="mt-6 border-2 border-dashed border-green-500 rounded-xl h-40 flex items-center justify-center">

Lapangan kosong

</div>

</div>

<nav class="fixed bottom-0 w-full bg-gray-950 border-t border-gray-800 flex justify-around p-4">

<button onclick="show('pack')">
🎁 PACK
</button>

<button onclick="show('lineup')">
⚽ LINEUP
</button>

</nav>

<script type="module">

import { sdk }
from 'https://esm.sh/@farcaster/miniapp-sdk';

import { encodeFunctionData }
from 'https://esm.sh/viem';

const MERCHANT=
"0x4A0F1AdBECABd3fc0DBD857D1AD5b39a35e98C21";

const USDC=
"0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";

let FID="guest";

const packs=[

{
img:"https://YOUR_FREE_PACK_LINK",
price:"FREE",
buy:"buy('free')"
},

{
img:"https://www.catbox.to/6cXAIfEUV8K20Eq/preview",
price:"$1",
buy:"buy(1)"
},

{
img:"https://YOUR_GOLD_PACK_LINK",
price:"$2",
buy:"buy(2)"
},

{
img:"https://YOUR_ULTIMATE_PACK_LINK",
price:"$3",
buy:"buy(3)"
}

];
img:"/pack-3.png",
price:"$3",
buy:"buy(3)"
}

];

let current=0;

window.show=(id)=>{

document.querySelectorAll('.tab-view')
.forEach(
x=>x.classList.remove('active')
);

document
.getElementById('tab-'+id)
.classList.add('active');

};

function renderPack(){

const p=packs[current];

document
.getElementById(
'packContainer'
)
.innerHTML=

`
<div class="pack-card">

<img
src="${p.img}"
class="pack-img">

<button
onclick="${p.buy}"
class="buy-btn">

BUY (${p.price})

</button>

</div>
`;

}

window.nextPack=()=>{

current++;

if(current>=packs.length)
current=0;

renderPack();

};

window.prevPack=()=>{

current--;

if(current<0)
current=packs.length-1;

renderPack();

};

async function pay(price){

const data=
encodeFunctionData({

abi:[{

name:'transfer',

type:'function',

stateMutability:'nonpayable',

inputs:[
{name:'to',type:'address'},
{name:'amount',type:'uint256'}
],

outputs:[
{type:'bool'}
]

}],

functionName:'transfer',

args:[
MERCHANT,
BigInt(price*1000000)
]

});

return sdk.actions.sendTransaction({

chainId:8453,

to:USDC,

value:'0',

data

});

}

window.buy=async(price)=>{

try{

if(price==="free"){

const key=`free_${FID}`;

const last=
Number(
localStorage.getItem(key)||0
);

const now=Date.now();

if(now-last<3600000){

alert(
"Free pack belum ready."
);

return;

}

localStorage
.setItem(
key,
now
);

document
.getElementById('pitch')
.innerHTML=

"🎁 FREE PACK OPENED!";

return;

}

await pay(price);

document
.getElementById('pitch')
.innerHTML=

`🏆 PACK ${price} BERHASIL`;

}
catch(e){

console.error(e);

alert(
"Transaksi dibatalkan"
);

}

};

await sdk.actions.ready();

const ctx=
await sdk.context;

FID=
ctx?.user?.fid
|| "guest";

document
.getElementById(
'walletText'
)
.innerText=

`FID: ${FID}`;

renderPack();

</script>

</body>
</html>
