<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup TCG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-content { display: none; } 
    .tab-content.active { display: block; }
    /* Desain Slider */
    .pack-slider {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 16px;
      padding: 20px 10px;
      scrollbar-width: none;
    }
    .pack-slider::-webkit-scrollbar { display: none; }
    .pack-card {
      flex: 0 0 75%;
      scroll-snap-align: center;
      border-radius: 24px;
      padding: 40px 20px;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body class="bg-gray-950 text-white font-sans pb-24">

  <header class="bg-gray-900/50 p-4 border-b border-gray-800 backdrop-blur-md">
    <h1 class="text-xl font-black text-center text-green-400">🏆 World Cup TCG</h1>
    <div class="flex justify-between mt-3 px-2 text-xs font-mono bg-black/30 p-2 rounded-lg">
      <span>$CONTOH: <span id="token-balance">0.00</span></span>
      <span>⚡Power: <span id="mining-power">0</span></span>
    </div>
  </header>

  <main>
    <section id="tab-pack" class="tab-content active">
      <h2 class="font-bold px-6 mt-6 mb-2">🎁 Buka Mystery Pack</h2>
      <div id="pack-container" class="pack-slider"></div>
    </section>

    <section id="tab-lineup" class="tab-content px-4">
      <h2 class="font-bold mt-6 mb-2">⚽ Lapangan Mining</h2>
      <div id="pitch-field" class="bg-green-900/20 border-2 border-dashed border-green-500/30 rounded-2xl h-48 flex flex-wrap items-center justify-center gap-2">
        <div id="lineup-slots" class="text-green-500 text-sm">Tarik kartu ke sini!</div>
      </div>
      <h2 class="font-bold mt-6 mb-2">Inventory Anda</h2>
      <div id="inventory-list" class="grid grid-cols-3 gap-3"></div>
    </section>

    <section id="tab-leaderboard" class="tab-content px-4">
      <h2 class="font-bold mt-6 mb-4">🏆 Leaderboard</h2>
      <div id="leaderboard-list" class="bg-gray-900 rounded-2xl p-4 text-sm">
        <p class="py-2 border-b border-gray-800">1. Chalvin Cahya - 5000 Power</p>
      </div>
    </section>
  </main>

  <nav class="fixed bottom-0 w-full bg-gray-950 border-t border-gray-800 flex justify-around p-4">
    <button onclick="switchTab('pack')" class="text-green-400 font-black text-xs">🎁 PACK</button>
    <button onclick="switchTab('lineup')" class="text-gray-500 font-black text-xs">⚽ LINE UP</button>
    <button onclick="switchTab('leaderboard')" class="text-gray-500 font-black text-xs">🏆 LEADERBOARD</button>
  </nav>

  <script type="module">
    import { sdk } from 'https://esm.sh/@farcaster/miniapp-sdk';
    
    let balance = 0; miningPower = 0; collection = [];
    const MY_WALLET = "0x4A0F1AdBECABd3fc0DBD857D1AD5b39a35e98C21";

    const packs = [
      { name: "Bronze", price: 1, power: 1, color: "bg-amber-900" },
      { name: "Silver", price: 3, power: 4, color: "bg-gray-600" },
      { name: "Gold", price: 5, power: 8, color: "bg-yellow-700" }
    ];

    const packCont = document.getElementById('pack-container');
    packs.forEach(p => {
      packCont.innerHTML += `
        <div class="pack-card ${p.color} flex flex-col items-center">
          <div class="text-[10px] font-bold uppercase tracking-widest opacity-70 mb-2">Premium Pack</div>
          <div class="text-5xl mb-4">🎁</div>
          <h3 class="font-black text-2xl mb-1">${p.name}</h3>
          <p class="text-xs opacity-80 mb-6">Berisi 5 Kartu Legendaris</p>
          <button onclick="buyPack(${p.power}, '${p.name}', ${p.price})" class="w-full bg-white text-black font-black py-4 rounded-xl shadow-xl active:scale-95 transition">
            Buy ($${p.price})
          </button>
        </div>`;
    });

    window.buyPack = async (powerMod, name, price) => {
      alert("Memproses transaksi " + price + " USDC...");
      for(let i = 0; i < 5; i++) {
        collection.push({ name: "Player " + Math.floor(Math.random()*99), power: Math.floor(Math.random()*20 * powerMod) });
      }
      alert("Berhasil mendapatkan 5 kartu!");
      renderInventory();
    };

    function renderInventory() {
      const inv = document.getElementById('inventory-list');
      inv.innerHTML = '';
      collection.forEach((card, index) => {
        inv.innerHTML += `
          <div class="bg-gray-800 p-3 rounded-xl text-center shadow-lg" onclick="addToLineUp(${index})">
            <div class="text-[10px] truncate">${card.name}</div>
            <div class="text-green-400 font-bold text-sm">⚡${card.power}</div>
          </div>`;
      });
    }

    window.addToLineUp = (index) => {
      const card = collection[index];
      miningPower += card.power;
      document.getElementById('lineup-slots').innerHTML += `<div class="bg-yellow-500 text-black px-2 py-1 rounded text-[10px] font-bold">${card.name}</div>`;
      document.getElementById('mining-power').innerText = miningPower;
    };

    window.switchTab = (id) => {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-'+id).classList.add('active');
    };

    setInterval(() => {
      balance += (miningPower * 0.0001);
      document.getElementById('token-balance').innerText = balance.toFixed(2);
    }, 1000);

    window.addEventListener('DOMContentLoaded', async () => { await sdk.actions.ready(); });
  </script>
</body>
</html>
