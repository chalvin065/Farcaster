<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup TCG</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.tab-view{display:none}
.tab-view.active{display:block}

.slider{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
gap:16px;
padding:20px;
scrollbar-width:none;
}

.card-pack{
flex:0 0 75%;
scroll-snap-align:center;
border-radius:24px;
padding:30px;
text-align:center;
color:white;
box-shadow:0 20px 40px rgba(0,0,0,.5);
}
</style>
</head>

<body class="bg-gray-950 text-white font-sans pb-24">

<header class="p-4 border-b border-gray-800 text-center">
<h1 class="text-xl font-black text-green-400">
🏆 World Cup TCG
</h1>

<p id="walletText"
class="text-[10px] text-gray-500">
Loading Farcaster...
</p>
</header>

<div id="tab-pack" class="tab-view active">

<h2 class="px-6 font-bold mt-4 text-center">
🎁 Mystery Packs
</h2>

<div class="slider">

<div class="card-pack bg-green-700">

<h3 class="font-black text-2xl">
FREE
</h3>

<div class="text-6xl my-4">
🎁
</div>

<p class="mb-6 text-xs">
1x setiap 1 jam
</p>

<button
onclick="buy('free')"
class="w-full bg-white text-black font-black py-3 rounded-xl">

FREE PACK

</button>

</div>

<div class="card-pack bg-amber-700">

<h3 class="font-black text-2xl">
BRONZE
</h3>

<div class="text-6xl my-4">
⚽
</div>

<button
onclick="buy(1)"
class="w-full bg-white text-black font-black py-3 rounded-xl">

BUY $1

</button>

</div>

<div class="card-pack bg-yellow-500">

<h3 class="font-black text-2xl">
GOLD
</h3>

<div class="text-6xl my-4">
🏆
</div>

<button
onclick="buy(2)"
class="w-full bg-black text-white font-black py-3 rounded-xl">

BUY $2

</button>

</div>

<div class="card-pack bg-blue-700">

<h3 class="font-black text-2xl">
ULTIMATE
</h3>

<div class="text-6xl my-4">
💎
</div>

<button
onclick="buy(3)"
class="w-full bg-white text-black font-black py-3 rounded-xl">

BUY $3

</button>

</div>

</div>
</div>

<div id="tab-lineup" class="tab-view px-6">

<h2 class="font-bold mt-4">
⚽ Lineup
</h2>

<div
id="pitch"
class="border-2 border-dashed border-green-500 rounded-xl h-40 mt-4 flex items-center justify-center text-green-500">

Lapangan kosong

</div>

</div>

<div id="tab-leaderboard"
class="tab-view px-6">

<h2 class="font-bold mt-4">
🏆 Leaderboard
</h2>

<div
class="bg-gray-800 p-4 rounded-xl mt-4 text-sm">

1. Anda — 0 Power

</div>

</div>

<nav class="fixed bottom-0 w-full bg-gray-950 border-t border-gray-800 flex justify-around p-4">

<button
onclick="show('pack')">

🎁 PACK

</button>

<button
onclick="show('lineup')">

⚽ LINEUP

</button>

<button
onclick="show('leaderboard')">

🏆 LB

</button>

</nav>

<script type="module">

import { sdk }
from 'https://esm.sh/@farcaster/miniapp-sdk';

import { encodeFunctionData }
from 'https://esm.sh/viem';

const MERCHANT =
"0x4A0F1AdBECABd3fc0DBD857D1AD5b39a35e98C21";

const USDC =
"0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";

let FID="guest";

window.show=(id)=>{

document.querySelectorAll('.tab-view')
.forEach(x=>x.classList.remove('active'));

document
.getElementById('tab-'+id)
.classList.add('active');

};

async function pay(price){

const calldata =
encodeFunctionData({

abi:[{

name:'transfer',
type:'function',
stateMutability:'nonpayable',

inputs:[
{name:'to',type:'address'},
{name:'amount',type:'uint256'}
],

outputs:[
{type:'bool'}
]

}],

functionName:'transfer',

args:[
MERCHANT,
BigInt(price*1000000)
]

});

return sdk.actions.sendTransaction({

chainId:8453,

to:USDC,

value:'0',

data:calldata

});

}

window.buy=async(price)=>{

try{

if(price==="free"){

const key=`freepack_${FID}`;

const last=
Number(localStorage.getItem(key)||0);

const now=Date.now();

if(now-last<3600000){

const mins=Math.ceil(
(3600000-(now-last))/60000
);

alert(
`Free pack ready ${mins} menit lagi`
);

return;

}

localStorage.setItem(key,now);

document.getElementById('pitch')
.innerHTML="🎁 FREE PACK OPENED!";

return;

}

await pay(price);

document.getElementById('pitch')
.innerHTML=`🏆 PACK $${price} BERHASIL!`;

}
catch(err){

console.error(err);

alert("Transaksi dibatalkan.");

}

};

window.addEventListener(
'DOMContentLoaded',
async()=>{

await sdk.actions.ready();

const ctx =
await sdk.context;

FID =
ctx?.user?.fid || "guest";

document
.getElementById('walletText')
.innerText=`FID: ${FID}`;

});

</script>

</body>
</html>
