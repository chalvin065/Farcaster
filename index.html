<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup TCG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-content { display: none; } 
    .tab-content.active { display: block; }
    .pack-slider { display: flex; overflow-x: auto; gap: 16px; padding: 20px 10px; }
    .pack-card { flex: 0 0 75%; border-radius: 20px; padding: 30px; text-align: center; }
  </style>
</head>
<body class="bg-gray-950 text-white font-sans pb-24">

  <header class="p-4 border-b border-gray-800">
    <h1 class="text-xl font-black text-center text-green-400">🏆 World Cup TCG</h1>
  </header>

  <main>
    <section id="tab-pack" class="tab-content active">
      <h2 class="font-bold px-6 mt-4">🎁 Buka Mystery Pack</h2>
      <div id="pack-container" class="pack-slider">
        <div class="pack-card bg-amber-900 flex flex-col items-center">
          <h3 class="font-black text-xl">Bronze</h3>
          <button onclick="alert('Membeli Bronze Pack')" class="mt-4 bg-white text-black px-6 py-2 rounded-lg font-bold">Beli $1</button>
        </div>
        <div class="pack-card bg-gray-600 flex flex-col items-center">
          <h3 class="font-black text-xl">Silver</h3>
          <button onclick="alert('Membeli Silver Pack')" class="mt-4 bg-white text-black px-6 py-2 rounded-lg font-bold">Beli $3</button>
        </div>
      </div>
    </section>
  </main>

  <nav class="fixed bottom-0 w-full bg-gray-950 border-t border-gray-800 flex justify-around p-4">
    <button onclick="switchTab('pack')" class="text-green-400 font-bold text-xs">🎁 PACK</button>
    <button onclick="switchTab('lineup')" class="text-gray-500 font-bold text-xs">⚽ LINE UP</button>
    <button onclick="switchTab('leaderboard')" class="text-gray-500 font-bold text-xs">🏆 LEADERBOARD</button>
  </nav>

  <script>
    function switchTab(id) {
      document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
      // Karena kita sederhanakan, kita beri pesan sementara untuk tab lain
      alert("Fitur " + id + " sedang dibangun!");
    }
  </script>
</body>
</html>
