<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>World Cup TCG</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#030712;
color:white;
font-family:sans-serif;
}

.tab-view{display:none}
.tab-view.active{display:block}

.slider{

display:flex;

justify-content:center;

align-items:center;

overflow-x:auto;

scroll-snap-type:x mandatory;

gap:22px;

padding:26px;

scrollbar-width:none;

}

.slider::-webkit-scrollbar{
display:none;
}

.pack-card{

flex:0 0 82%;

scroll-snap-align:center;

position:relative;

border-radius:38px;

padding:18px;

overflow:hidden;

box-shadow:
0 25px 55px rgba(0,0,0,.45);

}

.free{

background:
linear-gradient(
145deg,
#16a34a,
#14532d
);

}

.bronze{

background:
linear-gradient(
145deg,
#f59e0b,
#78350f
);

}

.gold{

background:
linear-gradient(
145deg,
#eab308,
#854d0e
);

}

.ultimate{

background:
linear-gradient(
145deg,
#3b82f6,
#312e81
);

}

.pack-inner{

height:520px;

border-radius:30px;

padding:28px;

background:
linear-gradient(
180deg,
rgba(255,255,255,.16),
rgba(255,255,255,.05)
);

display:flex;

flex-direction:column;

justify-content:space-between;

backdrop-filter:blur(10px);

}

.badge{

position:absolute;

top:18px;
left:18px;

background:black;

padding:8px 16px;

border-radius:999px;

font-size:11px;

font-weight:700;

}

.pack-logo{

font-size:14px;
font-weight:900;
opacity:.7;

}

.pack-title{

font-size:56px;

font-weight:900;

line-height:.9;

margin-top:50px;

}

.pack-sub{

font-size:13px;

letter-spacing:2px;

opacity:.85;

}

.pack-price{

font-size:44px;

font-weight:900;

}

.buy-btn{

width:100%;

padding:18px;

border-radius:24px;

font-weight:900;

font-size:18px;

background:white;

color:black;

margin-top:18px;

}

</style>
</head>

<body class="pb-24">

<header class="p-4 border-b border-gray-800 text-center">

<h1 class="text-2xl font-black text-green-400">
⚽ WORLD CUP TCG
</h1>

<p id="walletText"
class="text-xs text-gray-400">
Connecting...
</p>

</header>

<div id="tab-pack" class="tab-view active">

<div class="slider">

<!-- FREE -->

<div class="pack-card free">

<div class="badge">
FREE • 1H
</div>

<div class="pack-inner">

<div>

<div class="pack-logo">
WORLD CUP COLLECTION
</div>

<div class="pack-title">
FREE<br>PACK
</div>

</div>

<div>

<div class="pack-sub">
CLAIM EVERY 1 HOUR
</div>

<div class="pack-price">
FREE
</div>

<button
onclick="buy('free')"
class="buy-btn">

OPEN PACK

</button>

</div>

</div>
</div>

<!-- BRONZE -->

<div class="pack-card bronze">

<div class="badge">
BRONZE
</div>

<div class="pack-inner">

<div>

<div class="pack-logo">
WORLD CUP COLLECTION
</div>

<div class="pack-title">
BRONZE<br>PACK
</div>

</div>

<div>

<div class="pack-sub">
RARE PLAYERS
</div>

<div class="pack-price">
$1
</div>

<button
onclick="buy(1)"
class="buy-btn">

BUY $1

</button>

</div>

</div>
</div>

<!-- GOLD -->

<div class="pack-card gold">

<div class="badge">
GOLD
</div>

<div class="pack-inner">

<div>

<div class="pack-logo">
WORLD CUP COLLECTION
</div>

<div class="pack-title">
GOLD<br>PACK
</div>

</div>

<div>

<div class="pack-sub">
STAR PLAYERS
</div>

<div class="pack-price">
$2
</div>

<button
onclick="buy(2)"
class="buy-btn">

BUY $2

</button>

</div>

</div>
</div>

<!-- ULTIMATE -->

<div class="pack-card ultimate">

<div class="badge">
ULTIMATE
</div>

<div class="pack-inner">

<div>

<div class="pack-logo">
WORLD CUP COLLECTION
</div>

<div class="pack-title">
ULTIMATE<br>PACK
</div>

</div>

<div>

<div class="pack-sub">
LEGEND PLAYERS
</div>

<div class="pack-price">
$3
</div>

<button
onclick="buy(3)"
class="buy-btn">

BUY $3

</button>

</div>

</div>
</div>

</div>

</div>

<div id="tab-lineup"
class="tab-view px-6">

<div id="pitch"
class="mt-6 border-2 border-dashed border-green-500 rounded-xl h-40 flex items-center justify-center">

Lapangan kosong

</div>

</div>

<nav class="fixed bottom-0 w-full bg-gray-950 border-t border-gray-800 flex justify-around p-4">

<button onclick="show('pack')">
🎁 PACK
</button>

<button onclick="show('lineup')">
⚽ LINEUP
</button>

</nav>

<script type="module">

import { sdk }
from 'https://esm.sh/@farcaster/miniapp-sdk';

import { encodeFunctionData }
from 'https://esm.sh/viem';

const MERCHANT=
"0x4A0F1AdBECABd3fc0DBD857D1AD5b39a35e98C21";

const USDC=
"0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";

let FID="guest";

window.show=(id)=>{

document.querySelectorAll('.tab-view')
.forEach(x=>x.classList.remove('active'));

document
.getElementById('tab-'+id)
.classList.add('active');

};

async function pay(price){

const data=
encodeFunctionData({

abi:[{

name:'transfer',

type:'function',

stateMutability:'nonpayable',

inputs:[
{name:'to',type:'address'},
{name:'amount',type:'uint256'}
],

outputs:[{type:'bool'}]

}],

functionName:'transfer',

args:[
MERCHANT,
BigInt(price*1000000)
]

});

return sdk.actions.sendTransaction({

chainId:8453,

to:USDC,

value:'0',

data

});

}

window.buy=async(price)=>{

try{

if(price==="free"){

const key=`free_${FID}`;

const last=
Number(
localStorage.getItem(key)||0
);

const now=Date.now();

if(now-last<3600000){

const mins=Math.ceil(
(3600000-(now-last))/60000
);

alert(
`Ready lagi ${mins} menit`
);

return;

}

localStorage.setItem(
key,
now
);

document
.getElementById('pitch')
.innerHTML=
"🎁 FREE PACK OPENED!";

return;

}

await pay(price);

document
.getElementById('pitch')
.innerHTML=
`🏆 PACK $${price} BERHASIL`;

}
catch(e){

console.error(e);

alert("Transaksi dibatalkan");

}

};

await sdk.actions.ready();

const ctx=
await sdk.context;

FID=
ctx?.user?.fid
|| "guest";

document
.getElementById('walletText')
.innerText=
`FID: ${FID}`;

</script>

</body>
</html>
